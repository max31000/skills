# Universal Agent Skills — External Repository Configuration
# Format: repo_url|clone_name|src_subdir|skill1,skill2,...
#
# Fields:
#   repo_url    — Full git clone URL
#   clone_name  — Temp directory name used during cloning
#   src_subdir  — Subdirectory within repo containing skill folders ("." for root)
#   skills      — Comma-separated list of skill directory names to install
#
# Lines starting with # are comments. Blank lines are ignored.
# Both install-skills.sh and install-skills.ps1 read this file.

